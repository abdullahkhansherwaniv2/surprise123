<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎁 A Special Surprise for Hyypata!</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #1a0533;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── BAIT SCREEN ── */
    #bait {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .gift {
      font-size: 6rem;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-20px) rotate(5deg); }
    }

    #bait h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 6vw, 3rem);
      background: linear-gradient(90deg, #f9c74f, #ff6b9d, #43d9be, #f9c74f);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    #bait p {
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
    }

    #openBtn {
      margin-top: 1rem;
      background: linear-gradient(135deg, #ff6b9d, #f9c74f);
      border: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      animation: pulse 1.5s ease-in-out infinite;
      transition: transform 0.1s;
    }

    #openBtn:hover { transform: scale(1.05); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,157,0.6); }
      50%       { box-shadow: 0 0 0 18px rgba(255,107,157,0); }
    }

    /* stars */
    .star {
      position: fixed;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    /* ── SCARE SCREEN ── */
    #scare {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #scare img {
      width: min(90vw, 600px);
      animation: glitch 0.08s infinite;
    }

    @keyframes glitch {
      0%   { transform: translate(0,0) skewX(0deg); filter: hue-rotate(0deg); }
      20%  { transform: translate(-6px, 3px) skewX(3deg); filter: hue-rotate(90deg); }
      40%  { transform: translate(6px, -3px) skewX(-3deg); filter: hue-rotate(180deg); }
      60%  { transform: translate(-4px, 4px) skewX(2deg); filter: hue-rotate(270deg); }
      80%  { transform: translate(4px, -4px) skewX(-2deg); filter: hue-rotate(360deg); }
      100% { transform: translate(0,0) skewX(0deg); filter: hue-rotate(0deg); }
    }

    #scareText {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 8vw, 5rem);
      color: red;
      text-shadow: 0 0 20px red, 0 0 40px darkred;
      animation: flicker 0.15s infinite alternate;
      margin-top: 1rem;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes flicker {
      from { opacity: 1; }
      to   { opacity: 0.7; }
    }

    /* ── REVEAL SCREEN ── */
    #reveal {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease;
    }

    #reveal h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 7vw, 4rem);
      color: white;
      text-shadow: 0 0 20px rgba(249,199,79,0.8);
    }

    #reveal p {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      max-width: 380px;
      line-height: 1.7;
    }

    .laugh { font-size: 4rem; animation: bounce 1s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Stars -->
  <div id="starContainer"></div>

  <!-- BAIT -->
  <div id="bait">
    <div class="gift">🎁</div>
    <h1>Hyypata, you have<br>a special surprise!</h1>
    <p>Someone made something just for you 🥹<br>Click to open your gift!</p>
    <button id="openBtn" onclick="startScare()">Open My Surprise 🎀</button>
  </div>

  <!-- SCARE -->
  <div id="scare">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Jumpscare_clown.jpg/640px-Jumpscare_clown.jpg"
         onerror="this.style.display='none'" alt="BOO" />
    <div id="scareText">BOO! 👻💀</div>
  </div>

  <!-- REVEAL -->
  <div id="reveal">
    <div class="laugh">😂</div>
    <h1>Got you Hyypata!! 😈</h1>
    <p>Hahaha you totally fell for it! 💀<br>Don't worry, we still love you! 🥰</p>
    <div style="font-size:3rem; margin-top:0.5rem;">🎂🎉🎈</div>
  </div>

  <audio id="scareSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/scary-scream-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Stars
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
      document.getElementById('starContainer').appendChild(s);
    }

    function startScare() {
      document.getElementById('bait').style.display = 'none';
      const scare = document.getElementById('scare');
      scare.style.display = 'flex';

      // try play sound
      try { document.getElementById('scareSound').play(); } catch(e) {}

      // flash background red/black
      let flashes = 0;
      const flashInterval = setInterval(() => {
        document.body.style.background = flashes % 2 === 0 ? '#8b0000' : '#000';
        flashes++;
        if (flashes > 10) clearInterval(flashInterval);
      }, 100);

      // after 3 seconds show reveal
      setTimeout(() => {
        scare.style.display = 'none';
        document.body.style.background = '#1a0533';
        const reveal = document.getElementById('reveal');
        reveal.style.display = 'flex';

        // confetti
        const colors = ['#ff6b9d','#f9c74f','#43d9be','#ff8c42','#c77dff'];
        for (let i = 0; i < 60; i++) {
          const c = document.createElement('div');
          const size = 7 + Math.random() * 7;
          c.style.cssText = `
            position:fixed;top:-10px;
            left:${Math.random()*100}%;
            width:${size}px;height:${size}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            border-radius:${Math.random()>0.5?'50%':'2px'};
            animation:fall ${3+Math.random()*3}s linear ${Math.random()*2}s forwards;
            pointer-events:none;z-index:1000;
          `;
          document.body.appendChild(c);
        }

        const style = document.createElement('style');
        style.textContent = `@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}`;
        document.head.appendChild(style);

      }, 3000);
    }
  </script>
</body>
</html>
